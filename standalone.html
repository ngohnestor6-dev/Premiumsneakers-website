            <button class="nav-btn ${state.gender === 'Women' ? 'active' : ''}" onclick="setFilters('Women', 'all')">👩 Women</button>
            <button class="nav-btn ${state.gender === 'Kids' ? 'active' : ''}" onclick="setFilters('Kids', 'all')">👶 Kids</button>
            <button class="nav-btn ${state.category === 'Running' ? 'active' : ''}" onclick="setFilters('all', 'Running')">🏃 Running</button>
            <button class="nav-btn ${state.category === 'Basketball' ? 'active' : ''}" onclick="setFilters('all', 'Basketball')">🏀 Basketball</button>
            <button class="nav-btn ${state.category === 'Casual' ? 'active' : ''}" onclick="setFilters('all', 'Casual')">👟 Casual</button>
            <button class="nav-btn ${state.category === 'Formal' ? 'active' : ''}" onclick="setFilters('all', 'Formal')">🎩 Formal</button>
            <button class="nav-btn ${state.category === 'Trail' ? 'active' : ''}" onclick="setFilters('all', 'Trail')">🥾 Trail</button>
            <button class="nav-btn ${state.category === 'Sport' ? 'active' : ''}" onclick="setFilters('all', 'Sport')">⚽ Sport</button>
          </div>
        </nav>
        <main class="main-content">
          ${state.page === 'shop' ? shopPage() : ''}
          ${state.page === 'product' ? productPage() : ''}
          ${state.page === 'cart' ? cartPage() : ''}
          ${state.page === 'checkout' ? checkoutPage() : ''}
          ${state.page === 'confirmation' ? confirmationPage() : ''}
        </main>
        ${getFooter()}
      `;
    }

    function shopPage() {
      return `
        <div class="hero-banner">
          <div style="text-align: center;">
            <h1>Premium Sneakers & Athletic Wear</h1>
            <p>Shop the latest collection for Men, Women & Kids</p>
          </div>
        </div>
        <div class="container">
          <div class="brand-section">
            <h2>🏆 Featured Brands</h2>
            <div class="brand-grid">
              ${SHOE_BRANDS.map(brand => `
                <div class="brand-card">
                  <div class="brand-image" style="background-image: url('${brand.image}')"></div>
                  <div class="brand-info">
                    <div class="brand-name">${brand.name}</div>
                    <div style="font-size: 12px; color: #666; margin-bottom: 5px;">${brand.desc}</div>
                    <div class="brand-price">From $59.99</div>
                    <div class="brand-rating">⭐ 4.5+</div>
                    <button class="btn btn-primary" onclick="filterCategory('${brand.name}')">Shop</button>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>

          <div class="members-section">
            <h2>⭐ Our Top Rated Members</h2>
            <div class="members-grid">
              ${MEMBERS.map(member => `
                <div class="member-card">
                  <div class="member-name">${member.name}</div>
                  <div class="member-rating">${'★'.repeat(Math.floor(member.rating))} ${member.rating}</div>
                  <div class="member-reviews">${member.reviews} reviews</div>
                </div>
              `).join('')}
            </div>
          </div>

          <h2 class="mb-20">${getFilterTitle()}</h2>
          <div class="shop-container">
            ${getFilteredShoes().map(shoe => `
              <div class="shoe-card">
                <div class="shoe-image" style="background-image: url('${shoe.image}')"></div>
                <div class="shoe-info">
                  <div class="shoe-name">${shoe.name}</div>
                  <div style="font-size: 12px; color: #999; margin-bottom: 5px;">${shoe.gender} • ${shoe.category}</div>
                  <div class="shoe-price">$${shoe.price}</div>
                  <div class="shoe-rating">⭐ ${shoe.rating}</div>
                  <button class="btn btn-primary" onclick="selectShoe(${shoe.id})">View</button>
                </div>
              </div>
            `).join('')}
          </div>

          <div class="reviews-section">
            <h2>💬 Customer Reviews</h2>
            ${REVIEWS.map(review => `
              <div class="review-item">
                <div class="review-header">
                  <span class="review-author">${review.author}</span>
                  <span class="review-rating">${'★'.repeat(review.rating)}</span>
                </div>
                <p class="review-text">"${review.text}"</p>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function getFilterTitle() {
      if (state.gender === 'all' && state.category === 'all') return '🛍️ All Shoes';
      let title = '🛍️ ';
      if (state.gender !== 'all') title += state.gender + ' ';
      if (state.category !== 'all') title += state.category + ' ';
      return title + 'Shoes';
    }

    function getFilteredShoes() {
      return SHOES.filter(shoe => {
        const genderMatch = state.gender === 'all' || shoe.gender === state.gender;
        const categoryMatch = state.category === 'all' || shoe.category === state.category;
        return genderMatch && categoryMatch;
      });
    }

    function setFilters(gender, category) {
      state.gender = gender;
      state.category = category;
      render();
      window.scrollTo(0, 0);
    }

    function productPage() {
      const shoe = state.selected;
      if (!shoe) return '<div>No product selected</div>';
      return `
        <div class="container">
          <button class="btn btn-secondary mb-20" onclick="changePage('shop')">← Back</button>
          <div class="product-detail">
            <div class="product-image" style="background-image: url('${shoe.image}')"></div>
            <div class="product-info">
              <h1>${shoe.name}</h1>
              <div style="font-size: 14px; color: #999; margin-bottom: 15px;">
                <span style="background: #f0f0f0; padding: 4px 8px; border-radius: 4px; margin-right: 10px;">${shoe.gender}</span>
                <span style="background: #f0f0f0; padding: 4px 8px; border-radius: 4px;">${shoe.category}</span>
              </div>
              <div class="product-price">$${shoe.price}</div>
              <div class="shoe-rating">⭐ ${shoe.rating} (Based on customer feedback)</div>
              <p class="product-description">${shoe.desc}</p>
              <div class="size-selector">
                <label>Select Size:</label>
                <div class="size-options" id="sizes">
                  ${shoe.sizes.map(size => `
                    <button class="size-option" onclick="selectSize(${size})">${size}</button>
                  `).join('')}
                </div>
              </div>
              <div class="quantity-selector">
                <label>Quantity:</label>
                <input type="number" id="qty" min="1" max="10" value="1" class="quantity-input">
              </div>
              <button class="btn btn-primary" onclick="addToCart()">Add to Cart</button>
            </div>
          </div>
        </div>
      `;
    }

    function cartPage() {
      if (state.cart.length === 0) {
        return `
          <div class="container">
            <div class="empty-cart">
              <h2>Your cart is empty</h2>
              <button class="btn btn-primary mt-20" onclick="changePage('shop')">Continue Shopping</button>
            </div>
          </div>
        `;
      }
      const total = state.cart.reduce((sum, item) => sum + (item.price * item.qty), 0).toFixed(2);
      return `
        <div class="container">
          <h1 class="mb-20">Shopping Cart</h1>
          <div class="cart-container">
            <div class="cart-items">
              ${state.cart.map((item, i) => `
                <div class="cart-item">
                  <div class="cart-item-image" style="background-image: url('${item.image}')"></div>
                  <div class="cart-item-info">
                    <div class="cart-item-name">${item.name}</div>
                    <div class="cart-item-size">Size: ${item.size}</div>
                    <div class="cart-item-price">$${item.price}</div>
                    <input type="number" min="1" value="${item.qty}" onchange="updateQty(${i}, this.value)" style="width: 60px; padding: 5px;">
                    <button class="btn btn-secondary" onclick="removeCart(${i})">Remove</button>
                  </div>
                  <div style="text-align: right; font-weight: bold; color: #FF6B35;">$${(item.price * item.qty).toFixed(2)}</div>
                </div>
              `).join('')}
            </div>
            <div class="cart-summary">
              <h3>Order Summary</h3>
              <div class="summary-row"><span>Subtotal:</span><span>$${total}</span></div>
              <div class="summary-row"><span>Shipping:</span><span>Free</span></div>
              <div class="summary-row total"><span>Total:</span><span>$${total}</span></div>
              <button class="btn btn-primary" style="width: 100%; padding: 12px; margin-top: 20px;" onclick="changePage('checkout')">Checkout</button>
            </div>
          </div>
        </div>
      `;
    }

    function checkoutPage() {
      const total = state.cart.reduce((sum, item) => sum + (item.price * item.qty), 0).toFixed(2);
      return `
        <div class="container">
          <button class="btn btn-secondary mb-20" onclick="changePage('cart')">← Back</button>
          <h1 class="mb-20">Checkout</h1>
          <div class="checkout-container">
            <form class="checkout-form" onsubmit="placeOrder(event)">
              <h2>Shipping Information</h2>
              <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" required placeholder="John Doe">
              </div>
              <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="john@example.com">
              </div>
              <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" required placeholder="+237 XXX XXX XXX">
              </div>
              <div class="form-group">
                <label>Address (Limbe)</label>
                <input type="text" id="address" required placeholder="e.g., Down Beach Area, New Road">
              </div>
              <div class="form-group">
                <label>Payment Method</label>
                <select id="payment">
                  <option value="cash">Cash on Delivery (Limbe)</option>
                  <option value="momo">Mobile Money (MTN/Orange)</option>
                  <option value="bank">Bank Transfer</option>
                </select>
              </div>
              <button type="submit" class="btn-submit">Place Order - $${total}</button>
            </form>
            <div class="checkout-summary">
              <h3>Order Summary</h3>
              ${state.cart.map(item => `
                <div class="checkout-item">
                  <span>${item.name} x ${item.qty}</span>
                  <span>$${(item.price * item.qty).toFixed(2)}</span>
                </div>
              `).join('')}
              <div class="checkout-total"><span>Total:</span><span>$${total}</span></div>
            </div>
          </div>
        </div>
      `;
    }

    function confirmationPage() {
      const order = state.order;
      if (!order) return '<div>No order</div>';
      return `
        <div class="container">
          <div class="order-confirmation">
            <h2>✓ Order Confirmed!</h2>
            <p style="margin-bottom: 20px;">Order ID: <strong>#${order.id}</strong></p>
            <div class="order-details">
              <div class="order-detail-row"><span>Name:</span><strong>${order.name}</strong></div>
              <div class="order-detail-row"><span>Email:</span><strong>${order.email}</strong></div>
              <div class="order-detail-row"><span>Phone:</span><strong>${order.phone}</strong></div>
              <div class="order-detail-row"><span>Address:</span><strong>${order.address}</strong></div>
              <div class="order-detail-row"><span>Payment:</span><strong>${order.payment}</strong></div>
              <div class="order-detail-row"><span>Total:</span><strong style="color: #FF6B35;">$${order.total}</strong></div>
            </div>
            <p style="margin-top: 20px; color: #666;">We will contact you soon at ${order.phone} to confirm your order. Thank you for shopping at www.sneakers.com!</p>
            <button class="btn btn-primary mt-20" onclick="changePage('shop')">Continue Shopping</button>
          </div>
        </div>
      `;
    }

    function getFooter() {
      return `
        <footer>
          <div class="footer-content">
            <div class="footer-section">
              <h3>📍 www.sneakers.com - Limbe Location</h3>
              <div class="location-info">
                <p><strong>Limbe, Cameroon</strong></p>
                <p>📍 Down Beach Area, New Road</p>
                <p>📞 Phone: +237 672 996 820</p>
                <p>📧 Email: info@sneakers-limbe.com</p>
                <p>🕐 Hours: Mon-Sat 9AM-6PM, Sun 10AM-4PM</p>
              </div>
            </div>
            <div class="footer-section">
              <h3>About www.sneakers.com</h3>
              <p>Your trusted online destination for premium sneakers and athletic shoes. With over 100 styles for Men, Women & Kids, we guarantee the best selection and customer service in Limbe.</p>
              <p><strong>✓ Fast Delivery</strong><br>✓ Best Prices<br>✓ Quality Assured<br>✓ 7-Day Returns</p>
            </div>
          </div>
          <div style="text-align: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
            <p>&copy; 2026 www.sneakers.com. All rights reserved. | Chat with us on WhatsApp 💬</p>
          </div>
        </footer>
      `;
    }

    function changePage(page) {
      state.page = page;
      render();
      window.scrollTo(0, 0);
    }

    function selectShoe(id) {
      state.selected = SHOES.find(s => s.id === id);
      state.page = 'product';
      render();
      window.scrollTo(0, 0);
    }

    function selectSize(size) {
      if (state.selected) state.selected.selectedSize = size;
      const buttons = document.querySelectorAll('.size-option');
      buttons.forEach(b => b.classList.remove('selected'));
      event.target.classList.add('selected');
    }

    function addToCart() {
      if (!state.selected.selectedSize) {
        alert('Please select a size');
        return;
      }
      const qty = parseInt(document.getElementById('qty').value);
      const item = {
        ...state.selected,
        qty: qty,
        size: state.selected.selectedSize
      };
      state.cart.push(item);
      alert('✓ Added to cart!');
      changePage('shop');
    }

    function removeCart(index) {
      state.cart.splice(index, 1);
      render();
    }

    function updateQty(index, qty) {
      state.cart[index].qty = parseInt(qty);
      render();
    }

    function placeOrder(e) {
      e.preventDefault();
      const total = state.cart.reduce((sum, item) => sum + (item.price * item.qty), 0).toFixed(2);
      state.order = {
        id: Math.floor(Math.random() * 1000000),
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        address: document.getElementById('address').value,
        payment: document.getElementById('payment').value,
        total: total
      };
      state.cart = [];
      state.page = 'confirmation';
      render();
      window.scrollTo(0, 0);
    }

    function attachEvents() {}

    render();
  </script>
</body>
</html>
